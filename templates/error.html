<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Clash Royale Stats</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-animated"></div>

    <div class="container">
        <div class="error-container card">
            <div class="error-emoji">😢</div>
            <h1 class="section-title">Oops! Something went wrong</h1>
            <p class="error-message">{{ error }}</p>

            <div
                style="margin-top: var(--spacing-lg); padding: var(--spacing-md); background: rgba(255, 255, 255, 0.05); border-radius: var(--radius-md);">
                <p style="color: var(--text-secondary); margin-bottom: var(--spacing-sm);">
                    <strong>Common issues:</strong>
                </p>
                <ul style="color: var(--text-secondary); text-align: left; max-width: 500px; margin: 0 auto;">
                    <li>Invalid player tag (make sure it's correct)</li>
                    <li>API token not configured in config.py</li>
                    <li>API rate limit exceeded</li>
                    <li>Player profile is set to private</li>
                </ul>
            </div>

            <div style="margin-top: var(--spacing-xl);">
                <a href="/" class="btn btn-primary" style="text-decoration: none;">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>
</body>

</html>
